<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1c0d40"/>
      <stop offset="100%" stop-color="#050208"/>
    </radialGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#aab0bc"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#7c3aed" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- clock hand -->
  <line x1="32" y1="32" x2="32" y2="15" stroke="url(#silver)" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="2.6" fill="url(#silver)"/>
  <text x="32" y="50" font-family="Georgia, 'Playfair Display', serif" font-size="14" font-weight="700" fill="url(#silver)" text-anchor="middle">C</text>
</svg>
