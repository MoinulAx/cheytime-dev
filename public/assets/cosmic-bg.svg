<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glowA" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#3a1a78" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#1c0d40" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050208" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="22%" cy="78%" r="45%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#050208" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="84%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#050208" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="48%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <filter id="smoke" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.42
                0 0 0 0 0.18
                0 0 0 0 0.7
                0 0 0 0.7 0" result="violet"/>
      <feComponentTransfer in="violet" result="smoke">
        <feFuncA type="gamma" amplitude="1" exponent="2.4" offset="0"/>
      </feComponentTransfer>
      <feComposite in="smoke" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- deep space base -->
  <rect width="1920" height="1080" fill="#050208"/>

  <!-- nebula glows -->
  <rect width="1920" height="1080" fill="url(#glowA)"/>
  <rect width="1920" height="1080" fill="url(#glowB)"/>
  <rect width="1920" height="1080" fill="url(#glowC)"/>

  <!-- purple cosmic smoke -->
  <rect width="1920" height="1080" filter="url(#smoke)" opacity="0.5"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="240" cy="180" r="1.6" opacity="0.8"/>
    <circle cx="520" cy="120" r="1.1" opacity="0.5"/>
    <circle cx="880" cy="90" r="1.4" opacity="0.7"/>
    <circle cx="1340" cy="160" r="1.2" opacity="0.6"/>
    <circle cx="1660" cy="240" r="1.7" opacity="0.85"/>
    <circle cx="1780" cy="520" r="1.1" opacity="0.5"/>
    <circle cx="1520" cy="820" r="1.5" opacity="0.7"/>
    <circle cx="1100" cy="940" r="1.2" opacity="0.55"/>
    <circle cx="620" cy="900" r="1.6" opacity="0.8"/>
    <circle cx="200" cy="760" r="1.3" opacity="0.6"/>
    <circle cx="120" cy="460" r="1.1" opacity="0.5"/>
    <circle cx="980" cy="520" r="1" opacity="0.4"/>
    <circle cx="1400" cy="600" r="1.2" opacity="0.55"/>
    <circle cx="760" cy="320" r="1.1" opacity="0.5"/>
    <circle cx="1240" cy="380" r="1.3" opacity="0.6"/>
  </g>

  <!-- vignette to focus the centre -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
